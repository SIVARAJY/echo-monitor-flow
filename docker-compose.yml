version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: sepsisguard
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-Siva1226}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/mysql/setup.sql:/docker-entrypoint-initdb.d/setup.sql

  api:
    build: ./backend/api
    restart: always
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-Siva1226}
      DB_NAME: sepsisguard
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  db_data:
